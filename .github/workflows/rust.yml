name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-Dwarnings"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: "simd,unsafe-simd,imgref"
          # Linux ARM64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            features: "simd,imgref"
          # macOS x64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            features: "simd,unsafe-simd,imgref"
          # macOS ARM64
          - os: macos-latest
            target: aarch64-apple-darwin
            features: "simd,imgref"
          # Windows x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            features: "simd,unsafe-simd,imgref"
          # Windows ARM64
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            features: "simd,imgref"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --features "${{ matrix.features }}" -p fast-ssim2

      - name: Run tests
        run: cargo test --features "${{ matrix.features }}" -p fast-ssim2

  # Test with default features only
  test-default:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build with defaults
        run: cargo build -p fast-ssim2
      - name: Test with defaults
        run: cargo test -p fast-ssim2

  # ==========================================================================
  # Cross-compiled testing (32-bit) via QEMU
  # ==========================================================================
  test-cross:
    name: Cross (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - i686-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build (cross)
        run: cross build --features "simd,imgref" -p fast-ssim2 --target ${{ matrix.target }}
      - name: Test (cross/QEMU)
        run: cross test --features "simd,imgref" -p fast-ssim2 --target ${{ matrix.target }}

  # ==========================================================================
  # WASM testing
  # ==========================================================================
  test-wasm:
    name: Test WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,wasm32-wasip1
      - name: Install wasmtime
        run: |
          curl https://wasmtime.dev/install.sh -sSf | bash
          echo "$HOME/.wasmtime/bin" >> $GITHUB_PATH
      - name: Build (wasm32-unknown-unknown)
        env:
          RUSTFLAGS: "-C target-feature=+simd128"
        run: cargo build --target wasm32-unknown-unknown --features "simd,imgref" -p fast-ssim2 --lib
      - name: Test WASM with SIMD (wasm32-wasip1)
        env:
          CARGO_TARGET_WASM32_WASIP1_RUNNER: "wasmtime --dir=. --"
          RUSTFLAGS: "-C target-feature=+simd128"
        run: cargo test --target wasm32-wasip1 --features "simd,imgref" -p fast-ssim2 --lib --tests
      - name: Test WASM without SIMD (scalar)
        env:
          CARGO_TARGET_WASM32_WASIP1_RUNNER: "wasmtime --dir=. --"
        run: cargo test --target wasm32-wasip1 -p fast-ssim2 --lib --tests

  # Clippy lint check
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Clippy
        run: cargo clippy --features "simd,unsafe-simd,imgref" -p fast-ssim2 -- -D warnings

  # Format check
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check

  # MSRV check
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust 1.89.0
        uses: dtolnay/rust-toolchain@1.89.0
      - name: Check MSRV
        run: cargo check -p fast-ssim2

  # Code coverage
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --features "simd,unsafe-simd,imgref" -p fast-ssim2 --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
